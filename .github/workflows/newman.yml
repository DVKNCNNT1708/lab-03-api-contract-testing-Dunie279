name: Contract and Newman Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            npm init -y
            npm install -D @stoplight/spectral-cli wait-on newman newman-reporter-htmlextra
          fi
          npm install -g @stoplight/prism-cli

      - name: Lint OpenAPI contracts
        run: |
          if [ -d "contracts" ]; then
            npx @stoplight/spectral-cli lint contracts/*.yaml || npx @stoplight/spectral-cli lint contracts/*.yml
          else
            npx @stoplight/spectral-cli lint *.yaml || npx @stoplight/spectral-cli lint *.yml
          fi

      - name: Start Prism mock server
        run: |
          if [ -d "contracts" ]; then
            nohup prism mock contracts/*.yaml -p 4010 > prism.log 2>&1 &
          else
            nohup prism mock *.yaml -p 4010 > prism.log 2>&1 &
          fi

      - name: Wait for mock server
        run: |
          sleep 5
          npx wait-on http://127.0.0.1:4010 --timeout 15000 || (cat prism.log && exit 1)

      - name: Run Newman on mock environment
        run: |
          mkdir -p reports
          if [ -d "contracts" ] && [ -f contracts/*.json ]; then
            npx newman run contracts/*.json -r cli,htmlextra --reporter-htmlextra-export reports/report.html
          elif [ -d "docs" ] && [ -f docs/*.json ]; then
            npx newman run docs/*.json -r cli,htmlextra --reporter-htmlextra-export reports/report.html
          else
            npx newman run *.json -r cli,htmlextra --reporter-htmlextra-export reports/report.html || echo "No collection file found"
          fi

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/