name: Contract and Newman Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            npm init -y
            npm install -D @stoplight/spectral-cli wait-on newman newman-reporter-htmlextra
          fi

      - name: Lint OpenAPI contracts
        run: |
          CONTRACT_FILE=$(find . -name "*.yaml" -o -name "*.yml" | grep -v "node_modules" | head -n 1)
          echo "Linting file: $CONTRACT_FILE"
          npx @stoplight/spectral-cli lint "$CONTRACT_FILE"

      - name: Start Prism mock server
        run: |
          npm install -g @stoplight/prism-cli
          CONTRACT_FILE=$(find . -name "*.yaml" -o -name "*.yml" | grep -v "node_modules" | head -n 1)
          echo "Starting mock server with file: $CONTRACT_FILE"
          nohup prism mock "$CONTRACT_FILE" -p 4010 > prism.log 2>&1 &

      - name: Wait for mock server
        run: |
          sleep 3
          npx wait-on http://127.0.0.1:4010 --timeout 30000 || npx wait-on http://localhost:4010 --timeout 30000

      - name: Run Newman on mock environment
        run: |
          mkdir -p reports
          COLLECTION_FILE=$(find . -name "*.json" | grep -v "package" | head -n 1)
          if [ ! -z "$COLLECTION_FILE" ]; then
            echo "Running Newman with collection: $COLLECTION_FILE"
            npx newman run "$COLLECTION_FILE" -r cli,htmlextra --reporter-htmlextra-export reports/report.html
          else
            echo "No collection JSON file found in repository!"
            exit 1
          fi

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/