name: Contract and Newman Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Đã bỏ dòng check cache npm để không bị lỗi lockfile

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            npm init -y
            npm install -D @stoplight/spectral-cli wait-on newman newman-reporter-htmlextra
          fi

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/*.yaml

      - name: Start Prism mock server
        run: |
          npm install -g @stoplight/prism-cli
          nohup prism mock contracts/*.yaml -p 4010 > prism.log 2>&1 &

      - name: Wait for mock server
        run: npx wait-on http://localhost:4010/health --timeout 30000 || npx wait-on http://localhost:4010/ --timeout 30000

      - name: Run Newman on mock environment
        run: |
          mkdir -p reports
          if [ -f contracts/*.json ]; then
            npx newman run contracts/*.json -r cli,htmlextra --reporter-htmlextra-export reports/report.html
          else
            echo "No collection found, checking workflows..."
            npx newman run docs/*.json -r cli,htmlextra --reporter-htmlextra-export reports/report.html || true
          fi

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/